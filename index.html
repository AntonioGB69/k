<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos Python - Forca e Adivinhação</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: #2d3748;
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .game-selector {
            padding: 30px;
            text-align: center;
            background: #f7fafc;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .game-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .terminal {
            background: #1a202c;
            color: #00ff00;
            padding: 30px;
            font-size: 14px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }
        
        .input-area {
            background: #2d3748;
            padding: 20px 30px;
            display: flex;
            gap: 10px;
        }
        
        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #4a5568;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            background: #1a202c;
            color: #00ff00;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 12px 25px;
            font-size: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: bold;
        }
        
        .cursor {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Jogos Python</h1>
            <p>Forca e Adivinhação - Executando no navegador!</p>
        </div>
        
        <div class="game-selector">
            <h2>Escolha seu jogo:</h2>
            <div class="game-buttons">
                <button onclick="startGame('forca')">🎯 Jogo da Forca</button>
                <button onclick="startGame('adivinhacao')">🔢 Adivinhação</button>
                <button onclick="startGame('menu')">📋 Menu Principal</button>
            </div>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            Carregando Python... Por favor, aguarde.
        </div>
        
        <div class="terminal" id="output">Aguardando inicialização...<span class="cursor">_</span></div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Digite sua resposta aqui..." disabled>
            <button class="send-btn" onclick="sendInput()" disabled id="sendBtn">Enviar</button>
        </div>
    </div>

    <script>
        let pyodide;
        let inputResolver;
        let currentGame = null;
        
        // Inicializa o Pyodide
        async function initPyodide() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('output').textContent = 'Carregando Python no navegador...\n';
            
            pyodide = await loadPyodide();
            
            // Arquivo de palavras para o jogo da forca
            pyodide.FS.writeFile('palavras.txt', 'PYTHON\nJAVASCRIPT\nPROGRAMACAO\nDESENVOLVEDOR\nCOMPUTADOR\nTECNOLOGIA\nINTERNET\nSOFTWARE\nHARDWARE\nALGORITMO');
            
            document.getElementById('output').textContent = 'Python carregado! Escolha um jogo acima.\n';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
        }
        
        // Função para capturar input do usuário
        function customInput(prompt) {
            return new Promise((resolve) => {
                addOutput(prompt);
                inputResolver = resolve;
                document.getElementById('userInput').focus();
            });
        }
        
        // Adiciona texto ao terminal
        function addOutput(text) {
            const output = document.getElementById('output');
            output.textContent += text;
            output.scrollTop = output.scrollHeight;
        }
        
        // Envia input
        function sendInput() {
            const input = document.getElementById('userInput');
            const value = input.value;
            
            if (inputResolver && value !== '') {
                addOutput(value + '\n');
                inputResolver(value);
                inputResolver = null;
                input.value = '';
            }
        }
        
        // Permite enviar com Enter
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('userInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendInput();
                }
            });
            initPyodide();
        });
        
        // Inicia o jogo
        async function startGame(game) {
            if (!pyodide) {
                alert('Python ainda está carregando. Aguarde alguns segundos.');
                return;
            }
            
            document.getElementById('output').textContent = '';
            currentGame = game;
            
            // Override de print e input
            pyodide.globals.set('print', (...args) => {
                addOutput(args.join(' ') + '\n');
            });
            
            pyodide.globals.set('input', customInput);
            
            try {
                if (game === 'forca') {
                    await pyodide.runPythonAsync(forcaCode);
                } else if (game === 'adivinhacao') {
                    await pyodide.runPythonAsync(adivinhacaoCode);
                } else if (game === 'menu') {
                    await pyodide.runPythonAsync(jogosCode);
                }
            } catch (error) {
                addOutput('\n❌ Erro: ' + error.message + '\n');
            }
        }
        
        // Código dos jogos
        const adivinhacaoCode = `
import random

def jogar():
    print(" ****  ****  ****  ****  ****  ****  ****  **** *")
    print("Bem vindo ao jogo de Adivinhação!")
    print(" ****  ****  ****  ****  ****  ****  ****  **** *")
    
    numero_secreto = random.randrange(1,101)
    total_de_tentativas = 0
    pontos = 1000
    
    print("Qual nível de dificuldade?")
    print("(1) Fácil (2) Médio (3) Difícil")
    nivel = int(input("Defina o nível: "))
    
    if(nivel == 1):
        total_de_tentativas = 20
    elif(nivel == 2):
        total_de_tentativas = 10
    else:
        total_de_tentativas = 5
    
    for rodada in range(1, total_de_tentativas + 1):
        print("Tentativa {} de {}".format(rodada, total_de_tentativas))
        chute_str = input("Digite um número entre 1 e 100: ")
        print("Você digitou " , chute_str)
        chute = int(chute_str)
        
        if(chute < 1 or chute > 100):
            print("Você deve digitar um número entre 1 e 100!")
            continue
        
        acertou = chute == numero_secreto
        maior   = chute > numero_secreto
        menor   = chute < numero_secreto
        
        if(acertou):
            print("Você acertou e fez {} pontos!".format(pontos))
            break
        else:
            if(maior):
                print("Você errou! O seu chute foi maior do que o número secreto.")
            elif(menor):
                print("Você errou! O seu chute foi menor do que o número secreto.")
            pontos_perdidos = abs(numero_secreto - chute)
            pontos = pontos - pontos_perdidos
    
    print("Fim do jogo")

jogar()
`;

        const forcaCode = `
import random

def jogar():
    imprime_mensagem_abertura()
    palavra_secreta = carrega_palavra_secreta()
    letras_acertadas = inicializa_letras_acertadas(palavra_secreta)
    print("".join(letras_acertadas))
    
    enforcou = False
    acertou = False
    erros = 0
    
    while(not enforcou and not acertou):
        chute = pede_chute()
        
        if(chute in palavra_secreta):
            marca_chute_correto(chute, letras_acertadas, palavra_secreta)
        else:
            erros += 1
            desenha_forca(erros)
        
        enforcou = erros == 7
        acertou = "_" not in letras_acertadas
        print("".join(letras_acertadas))
    
    if(acertou):
        imprime_mensagem_vencedor()
    else:
        imprime_mensagem_perdedor(palavra_secreta)

def desenha_forca(erros):
    print("  _______     ")
    print(" |/      |    ")
    
    if(erros == 1):
        print(" |      (_)   ")
        print(" |            ")
        print(" |            ")
        print(" |            ")
    if(erros == 2):
        print(" |      (_)   ")
        print(" |      \\\\     ")
        print(" |            ")
        print(" |            ")
    if(erros == 3):
        print(" |      (_)   ")
        print(" |      \\\\|    ")
        print(" |            ")
        print(" |            ")
    if(erros == 4):
        print(" |      (_)   ")
        print(" |      \\\\|/   ")
        print(" |            ")
        print(" |            ")
    if(erros == 5):
        print(" |      (_)   ")
        print(" |      \\\\|/   ")
        print(" |       |    ")
        print(" |            ")
    if(erros == 6):
        print(" |      (_)   ")
        print(" |      \\\\|/   ")
        print(" |       |    ")
        print(" |      /     ")
    if (erros == 7):
        print(" |      (_)   ")
        print(" |      \\\\|/   ")
        print(" |       |    ")
        print(" |      / \\\\   ")
    
    print(" |            ")
    print("_|___         ")
    print()

def imprime_mensagem_vencedor():
    print("Parabéns, você ganhou!")
    print("       ___________      ")
    print("      '._==_==_=_.'     ")
    print("      .-\\\\:      /-.    ")
    print("     | (|:.     |) |    ")
    print("      '-|:.     |-'     ")
    print("        \\\\::.    /      ")
    print("         '::. .'        ")
    print("           ) (          ")
    print("         _.' '._        ")
    print("        '-------'       ")

def imprime_mensagem_perdedor(palavra_secreta):
    print("Puxa, você foi enforcado!")
    print("A palavra era {}".format(palavra_secreta))
    print("    _______________         ")
    print("   /               \\\\       ")
    print("  /                 \\\\      ")
    print("//                   \\\\/\\\\  ")
    print("\\\\|   XXXX     XXXX   | /   ")
    print(" |   XXXX     XXXX   |/     ")
    print(" |   XXX       XXX   |      ")
    print(" |                   |      ")
    print(" \\\\__      XXX      __/     ")
    print("   |\\\\     XXX     /|       ")
    print("   | |           | |        ")
    print("   | I I I I I I I |        ")
    print("   |  I I I I I I  |        ")
    print("   \\\\_             _/       ")
    print("     \\\\_         _/         ")
    print("       \\\\_______/           ")

def marca_chute_correto(chute, letras_acertadas, palavra_secreta):
    index = 0
    for letra in palavra_secreta:
        if (chute == letra):
            letras_acertadas[index] = letra
        index += 1

def pede_chute():
    chute = input("Qual letra? ")
    chute = chute.strip().upper()
    return chute

def inicializa_letras_acertadas(palavra):
    return ["_" for letra in palavra]

def imprime_mensagem_abertura():
    print(" ****  ****  ****  ****  ****  ****  ****  **** *")
    print(" ***Bem vindo ao jogo da Forca!** *")
    print(" ****  ****  ****  ****  ****  ****  ****  **** *")

def carrega_palavra_secreta():
    arquivo = open("palavras.txt", "r")
    palavras = []
    for linha in arquivo:
        linha = linha.strip()
        palavras.append(linha)
    arquivo.close()
    
    numero = random.randrange(0, len(palavras))
    palavra_secreta = palavras[numero].upper()
    return palavra_secreta

jogar()
`;
